# Bumps package.json patch version after each push to the default release branch (merge to master/main).
# The bump commit includes [skip ci] so this workflow does not run again on that push.
name: Bump version on merge

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: bump-version-master
  cancel-in-progress: false

jobs:
  bump:
    # Avoid infinite loop: skip when the push is our own version-bump commit
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git commit -m "chore: bump version [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
