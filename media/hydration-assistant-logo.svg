<svg width="255" height="255" viewBox="0 0 255 255" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#6EE7FF"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>

    <!-- Drop gradient -->
    <linearGradient id="dropGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7FF"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="127.5" cy="127.5" r="120" fill="url(#bgGrad)" />

  <!-- Glow circle -->
  <circle cx="127.5" cy="127.5" r="90" fill="#ffffff20" filter="url(#glow)"/>

  <!-- Water drop -->
  <path d="M127.5 45 
           C95 100, 75 125, 75 155 
           A52 52 0 0 0 180 155 
           C180 125, 160 100, 127.5 45 Z"
        fill="url(#dropGrad)" />

  <!-- Highlight -->
  <ellipse cx="110" cy="110" rx="12" ry="20" fill="#ffffff50"/>

  <!-- Eyes -->
  <circle cx="110" cy="150" r="7" fill="#0F172A"/>
  <circle cx="145" cy="150" r="7" fill="#0F172A"/>

  <!-- Eye shine -->
  <circle cx="113" cy="147" r="2" fill="#fff"/>
  <circle cx="148" cy="147" r="2" fill="#fff"/>

  <!-- Smile -->
  <path d="M108 172 Q127.5 190 147 172"
        stroke="#0F172A"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>

  <!-- Bottle -->
  <g transform="rotate(-15 85 165)">
    <rect x="75" y="150" width="20" height="38" rx="5" fill="#BFDBFE"/>
    <rect x="78" y="140" width="14" height="12" rx="3" fill="#60A5FA"/>
  </g>

</svg>